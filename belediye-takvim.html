<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anılar — Hatıran Yeter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- PWA -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anılar">
<meta name="theme-color" content="#1a2340">
<link rel="manifest" href="data:application/json;charset=utf-8,{
  &quot;name&quot;: &quot;Anılar — Hatıran Yeter&quot;,
  &quot;short_name&quot;: &quot;Anılar&quot;,
  &quot;description&quot;: &quot;Belediye önemli günler takvimi&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;background_color&quot;: &quot;#F8F4EE&quot;,
  &quot;theme_color&quot;: &quot;#1a2340&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;icons&quot;: [{
    &quot;src&quot;: &quot;data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'&gt;&lt;rect width='192' height='192' rx='32' fill='%231a2340'/&gt;&lt;text x='96' y='130' font-size='110' text-anchor='middle'&gt;📅&lt;/text&gt;&lt;/svg&gt;&quot;,
    &quot;sizes&quot;: &quot;192x192&quot;,
    &quot;type&quot;: &quot;image/svg+xml&quot;
  }]
}">
<style>
  :root {
    --red: #C0392B;
    --navy: #1a2340;
    --gold: #D4A843;
    --green: #1a6e3c;
    --purple: #6c3483;
    --teal: #0e7490;
    --cream: #F8F4EE;
    --text: #1a2340;
    --muted: #7a8299;
    --border: #e8e2d8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

  header { background:var(--navy); position:relative; overflow:hidden; }
  header::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 80px); }
  .header-inner { display:flex; align-items:center; justify-content:space-between; padding:22px 36px; position:relative; z-index:1; }
  .logo-area { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:46px;height:46px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px; }
  .logo-text h1 { font-family:'Playfair Display',serif; font-size:19px; color:#fff; }
  .logo-text p { font-size:10px; color:rgba(255,255,255,.4); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .header-date { text-align:right; }
  .header-date .big-date { font-family:'Playfair Display',serif; font-size:28px; color:#fff; line-height:1; }
  .header-date .year-label { font-size:11px; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-top:3px; }

  .alert-banner { padding:13px 36px; display:flex; align-items:center; gap:12px; }
  .pulse-dot { width:9px;height:9px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  .alert-banner p { color:#fff; font-size:14px; font-weight:500; }
  .alert-banner strong { font-weight:700; }

  main { max-width:1240px; margin:0 auto; padding:36px 22px; }

  .tabs { display:flex; gap:3px; background:#fff; border:1px solid var(--border); border-radius:10px; padding:4px; margin-bottom:28px; width:fit-content; flex-wrap:wrap; }
  .tab { padding:8px 18px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:'IBM Plex Sans',sans-serif; transition:all .15s; }
  .tab.active { background:var(--navy); color:#fff; }

  .section-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .section-header h2 { font-family:'Playfair Display',serif; font-size:21px; color:var(--navy); white-space:nowrap; }
  .section-line { flex:1; height:1px; background:linear-gradient(to right,var(--border),transparent); }
  .badge { background:var(--navy); color:#fff; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
  .badge.gold { background:var(--gold); color:var(--navy); }
  .badge.red { background:var(--red); }

  .search-area { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:28px; }
  .search-box { display:flex; align-items:center; background:#fff; border:1px solid var(--border); border-radius:8px; padding:9px 14px; gap:8px; flex:1; min-width:180px; }
  .search-box input { border:none; outline:none; font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:var(--text); width:100%; background:transparent; }
  .search-box input::placeholder { color:var(--muted); }
  .filter-btn { padding:9px 13px; border:1px solid var(--border); background:#fff; border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:500; color:var(--text); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .filter-btn.active        { background:var(--navy);   color:#fff; border-color:var(--navy); }
  .filter-btn.active-resmi  { background:var(--red);    color:#fff; border-color:var(--red); }
  .filter-btn.active-milli  { background:var(--navy);   color:#fff; border-color:var(--navy); }
  .filter-btn.active-dini   { background:var(--green);  color:#fff; border-color:var(--green); }
  .filter-btn.active-tema   { background:var(--teal);   color:#fff; border-color:var(--teal); }
  .filter-btn.active-ozel   { background:var(--purple); color:#fff; border-color:var(--purple); }

  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; margin-bottom:44px; }

  .day-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px 20px; display:flex; gap:14px; align-items:flex-start; transition:transform .18s,box-shadow .18s; position:relative; overflow:hidden; }
  .day-card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; border-radius:12px 0 0 12px; background:var(--navy); }
  .day-card.today::before    { background:var(--red); }
  .day-card.tomorrow::before { background:var(--gold); }
  .day-card.week::before     { background:#27AE60; }
  .day-card:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(26,35,64,.1); }
  .day-card.today    { background:#fff8f7; border-color:#f5cdc9; }
  .day-card.tomorrow { background:#fffdf5; border-color:#f0e0b0; }

  .date-box { min-width:50px;height:54px;background:var(--cream);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border);flex-shrink:0; }
  .day-card.today    .date-box { background:#fde8e6; border-color:#f5cdc9; }
  .day-card.tomorrow .date-box { background:#fef9ec; border-color:#f0e0b0; }
  .date-box .day-num    { font-family:'Playfair Display',serif; font-size:21px; font-weight:900; color:var(--navy); line-height:1; }
  .date-box .month-abbr { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-weight:600; }

  .card-info { flex:1; min-width:0; }
  .card-tag  { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:4px; }
  .tag-resmi { color:var(--red); }
  .tag-milli { color:var(--navy); }
  .tag-dini  { color:var(--green); }
  .tag-tema  { color:var(--teal); }
  .tag-ozel  { color:var(--purple); }
  .card-title { font-size:14px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:5px; }
  .card-desc  { font-size:12px; color:var(--muted); line-height:1.5; }

  .urgency-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; margin-top:7px; }
  .chip-today    { background:#fde8e6; color:var(--red); }
  .chip-tomorrow { background:#fef9ec; color:#b8860b; }
  .chip-week     { background:#e8f8ee; color:#1e8448; }

  .card-delete { position:absolute; top:10px; right:10px; background:none; border:none; color:#ccc; cursor:pointer; font-size:14px; padding:2px 5px; border-radius:4px; transition:color .15s,background .15s; }
  .card-delete:hover { color:var(--red); background:#fde8e6; }

  /* ADD FORM */
  .add-form-box { background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px 28px 24px; margin-bottom:36px; }
  .add-form-box h3 { font-family:'Playfair Display',serif; font-size:18px; color:var(--navy); margin-bottom:20px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .form-group input,.form-group select,.form-group textarea { border:1px solid var(--border); border-radius:8px; padding:9px 13px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; color:var(--text); background:var(--cream); outline:none; transition:border-color .15s; }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--navy); background:#fff; }
  .form-group textarea { resize:vertical; min-height:68px; }
  .form-actions { display:flex; gap:10px; margin-top:18px; justify-content:flex-end; }
  .btn-primary   { background:var(--navy); color:#fff; border:none; padding:10px 24px; border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background .15s; }
  .btn-primary:hover { background:#243058; }
  .btn-secondary { background:#fff; color:var(--muted); border:1px solid var(--border); padding:10px 18px; border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; cursor:pointer; transition:all .15s; }
  .btn-secondary:hover { border-color:var(--navy); color:var(--navy); }

  /* YEAR */
  .months-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:44px; }
  .month-block { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px; }
  .month-block h3 { font-family:'Playfair Display',serif; font-size:14px; color:var(--navy); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .month-event { display:flex; gap:8px; align-items:flex-start; margin-bottom:6px; font-size:12px; }
  .month-event .ev-day { font-weight:700; color:var(--red); min-width:22px; font-size:11px; }
  .month-event .ev-name { color:var(--text); line-height:1.3; display:flex; align-items:flex-start; gap:4px; }
  .month-dot { display:inline-block; width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px; }
  .dot-resmi { background:var(--red); }
  .dot-milli { background:var(--navy); }
  .dot-dini  { background:var(--green); }
  .dot-tema  { background:var(--teal); }
  .dot-ozel  { background:var(--purple); }

  .view { display:none; }
  .view.active { display:block; }

  .empty-state { text-align:center; padding:56px 20px; color:var(--muted); grid-column:1/-1; }
  .empty-state .icon { font-size:44px; margin-bottom:10px; }

  #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--navy); color:#fff; padding:12px 24px; border-radius:30px; font-size:13px; font-weight:500; transition:transform .3s; z-index:9999; pointer-events:none; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* LEGEND */
  .legend { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .legend-dot { width:10px;height:10px;border-radius:50%; }

  footer { background:var(--navy); color:rgba(255,255,255,.35); text-align:center; padding:18px; font-size:11px; letter-spacing:1.5px; }

  @media(max-width:640px) {
    .header-inner { padding:16px 18px; }
    main { padding:22px 14px; }
    .form-grid { grid-template-columns:1fr; }
    .header-date .big-date { font-size:20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">🏛️</div>
      <div class="logo-text">
        <h1>Anılar</h1>
        <p>Hatıran Yeter</p>
      </div>
    </div>
    <div class="header-date">
      <div class="big-date" id="todayDisplay">—</div>
      <div class="year-label" id="todayYear">2026</div>
    </div>
  </div>
</header>

<div class="alert-banner" id="alertBanner" style="display:none">
  <div class="pulse-dot"></div>
  <p id="alertText"></p>
</div>

<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('upcoming')">📅 Yaklaşan</button>
    <button class="tab" onclick="switchTab('all')">📋 Tüm Takvim</button>
    <button class="tab" onclick="switchTab('year')">📆 Aylık Özet</button>
    <button class="tab" onclick="switchTab('add')">➕ Özel Gün Ekle</button>
  </div>

  <!-- UPCOMING -->
  <div class="view active" id="view-upcoming">
    <div class="search-area">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Gün ara..." oninput="renderUpcoming()">
      </div>
      <button class="filter-btn active" id="fb-all"   onclick="setFilter('all')">Tümü</button>
      <button class="filter-btn" id="fb-resmi" onclick="setFilter('resmi')">🏛️ Resmi</button>
      <button class="filter-btn" id="fb-milli" onclick="setFilter('milli')">🇹🇷 Milli</button>
      <button class="filter-btn" id="fb-dini"  onclick="setFilter('dini')">☪️ Dini</button>
      <button class="filter-btn" id="fb-tema"  onclick="setFilter('tema')">🌿 Tema</button>
      <button class="filter-btn" id="fb-ozel"  onclick="setFilter('ozel')">⭐ Özel</button>
    </div>
    <div class="section-header">
      <h2>Yaklaşan & Bu Ay</h2>
      <div class="section-line"></div>
      <span class="badge red" id="upcomingCount">0</span>
    </div>
    <div class="cards-grid" id="upcomingCards"></div>
  </div>

  <!-- ALL -->
  <div class="view" id="view-all">
    <div class="section-header">
      <h2>Tüm Önemli Günler</h2>
      <div class="section-line"></div>
      <span class="badge" id="allCount">0</span>
    </div>
    <div class="cards-grid" id="allCards"></div>
  </div>

  <!-- YEAR -->
  <div class="view" id="view-year">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Resmi Tatil</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--navy)"></div> Milli Gün</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Dini Gün</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div> Tema Günü</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Özel Gün</div>
    </div>
    <div class="section-header">
      <h2>Aylık Özet</h2>
      <div class="section-line"></div>
      <span class="badge gold">2026</span>
    </div>
    <div class="months-grid" id="yearGrid"></div>
  </div>

  <!-- ADD -->
  <div class="view" id="view-add">
    <div class="section-header">
      <h2>Özel Gün Ekle</h2>
      <div class="section-line"></div>
    </div>
    <div class="add-form-box">
      <h3>📝 Yeni Gün / Şehit Anma / Özel Etkinlik Ekle</h3>
      <div class="form-grid">
        <div class="form-group full">
          <label>Gün Adı</label>
          <input type="text" id="f-isim" placeholder="ör. Şehit Er Mehmet Yılmaz'ı Anma Töreni">
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="f-tur">
            <option value="ozel">⭐ Özel Gün</option>
            <option value="milli">🇹🇷 Milli Gün</option>
            <option value="dini">☪️ Dini Gün</option>
            <option value="resmi">🏛️ Resmi Tatil</option>
            <option value="tema">🌿 Tema Günü</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ay</label>
          <select id="f-ay">
            <option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option>
            <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
            <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
            <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
          </select>
        </div>
        <div class="form-group">
          <label>Gün (1–31)</label>
          <input type="number" id="f-gun" placeholder="ör. 15" min="1" max="31">
        </div>
        <div class="form-group full">
          <label>Açıklama (isteğe bağlı)</label>
          <textarea id="f-aciklama" placeholder="ör. Belediye meydanında çelenk sunumu ve anma töreni düzenlenecektir."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="clearForm()">Temizle</button>
        <button class="btn-primary" onclick="addCustomDay()">✓ Takvime Ekle</button>
      </div>
    </div>

    <div id="customDaysList" style="display:none">
      <div class="section-header">
        <h2>Eklenen Özel Günler</h2>
        <div class="section-line"></div>
        <span class="badge" id="customCount">0</span>
      </div>
      <div class="cards-grid" id="customCards"></div>
    </div>
  </div>
</main>

<div id="toast"></div>
<footer>ANILAR — HATIRAN YETER 📅</footer>

<script>

// localStorage
let customDays = [];
try { const s = localStorage.getItem('bld_ozel'); if(s) customDays = JSON.parse(s); } catch(e){}
function saveCustom() { try { localStorage.setItem('bld_ozel', JSON.stringify(customDays)); } catch(e){} }

function allGunler() {
  return [...SABIT_GUNLER, ...customDays].sort((a,b) => a.ay - b.ay || a.gun - b.gun);
}

let currentFilter = 'all';
function todayDate() { return new Date(); }
function dateForEvent(ev) { return new Date(2026, ev.ay-1, ev.gun); }
function diffDays(d1,d2) {
  const t1 = new Date(d1.getFullYear(),d1.getMonth(),d1.getDate());
  const t2 = new Date(d2.getFullYear(),d2.getMonth(),d2.getDate());
  return Math.round((t2-t1)/86400000);
}

const TUR_LABEL = {resmi:'RESMİ TATİL', milli:'MİLLİ GÜN', dini:'DİNİ GÜN', tema:'TEMA GÜNÜ', ozel:'ÖZEL GÜN'};
const TUR_CLASS = {resmi:'tag-resmi',   milli:'tag-milli',  dini:'tag-dini',  tema:'tag-tema',  ozel:'tag-ozel'};
const TUR_DOT   = {resmi:'dot-resmi',   milli:'dot-milli',  dini:'dot-dini',  tema:'dot-tema',  ozel:'dot-ozel'};
const TUR_ICON  = {resmi:'🏛️', milli:'🇹🇷', dini:'☪️', tema:'🌿', ozel:'⭐'};

function renderHeader() {
  const t = todayDate();
  document.getElementById('todayDisplay').textContent = `${t.getDate()} ${MONTHS[t.getMonth()]}`;
  document.getElementById('todayYear').textContent = t.getFullYear();
}

function renderAlert() {
  const t = todayDate(); const all = allGunler();
  const todayEvs    = all.filter(ev => diffDays(t, dateForEvent(ev)) === 0);
  const tomorrowEvs = all.filter(ev => diffDays(t, dateForEvent(ev)) === 1);
  const banner = document.getElementById('alertBanner');
  const txt    = document.getElementById('alertText');
  if (todayEvs.length) {
    banner.style.display='flex'; banner.style.background='#C0392B';
    txt.innerHTML=`🎉 <strong>BUGÜN:</strong> ${todayEvs.map(e=>e.isim).join(' · ')}`;
  } else if (tomorrowEvs.length) {
    banner.style.display='flex'; banner.style.background='#D4A843';
    txt.innerHTML=`⚠️ <strong>YARIN:</strong> ${tomorrowEvs.map(e=>e.isim).join(' · ')} — Hazırlıklarınızı tamamlayın!`;
  } else { banner.style.display='none'; }
}

function cardHTML(ev, idx, isCustom) {
  const t = todayDate(); const diff = diffDays(t, dateForEvent(ev));
  let cardClass='', chip='';
  if      (diff===0)             { cardClass='today';    chip=`<div class="urgency-chip chip-today">🔴 BUGÜN</div>`; }
  else if (diff===1)             { cardClass='tomorrow'; chip=`<div class="urgency-chip chip-tomorrow">⚠️ YARIN</div>`; }
  else if (diff>0 && diff<=7)   { cardClass='week';     chip=`<div class="urgency-chip chip-week">📅 ${diff} gün kaldı</div>`; }
  const delBtn = isCustom ? `<button class="card-delete" title="Sil" onclick="deleteCustomDay(${idx})">✕</button>` : '';
  return `
    <div class="day-card ${cardClass}">
      ${delBtn}
      <div class="date-box">
        <div class="day-num">${ev.gun}</div>
        <div class="month-abbr">${MONTHS_SHORT[ev.ay-1]}</div>
      </div>
      <div class="card-info">
        <div class="card-tag ${TUR_CLASS[ev.tur]}">${TUR_ICON[ev.tur]} ${TUR_LABEL[ev.tur]}</div>
        <div class="card-title">${ev.isim}</div>
        <div class="card-desc">${ev.aciklama||''}</div>
        ${chip}
      </div>
    </div>`;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className='filter-btn');
  const btn = document.getElementById('fb-'+f);
  btn.classList.add(f==='all' ? 'active' : 'active-'+f);
  renderUpcoming();
}

function renderUpcoming() {
  const t=todayDate(), q=document.getElementById('searchInput').value.toLowerCase();
  const all=allGunler();
  let filtered = all.filter(ev => {
    const diff = diffDays(t, dateForEvent(ev));
    if (diff < -1) return false;
    if (currentFilter!=='all' && ev.tur!==currentFilter) return false;
    if (q && !ev.isim.toLowerCase().includes(q)) return false;
    return true;
  });
  const container = document.getElementById('upcomingCards');
  if (!filtered.length) {
    container.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>Sonuç bulunamadı.</p></div>`;
    document.getElementById('upcomingCount').textContent=0; return;
  }
  container.innerHTML = filtered.map(ev => cardHTML(ev, customDays.indexOf(ev), customDays.includes(ev))).join('');
  document.getElementById('upcomingCount').textContent = filtered.length;
}

function renderAll() {
  const all=allGunler();
  document.getElementById('allCards').innerHTML = all.map(ev => cardHTML(ev, customDays.indexOf(ev), customDays.includes(ev))).join('');
  document.getElementById('allCount').textContent = all.length;
}

function renderYear() {
  const all=allGunler(); let html='';
  for (let m=1;m<=12;m++) {
    const evs = all.filter(ev=>ev.ay===m);
    if (!evs.length) continue;
    html += `<div class="month-block"><h3>${MONTHS[m-1]}</h3>`;
    evs.forEach(ev => {
      html += `<div class="month-event"><span class="ev-day">${ev.gun}</span><span class="ev-name"><span class="month-dot ${TUR_DOT[ev.tur]}"></span>${ev.isim}</span></div>`;
    });
    html += `</div>`;
  }
  document.getElementById('yearGrid').innerHTML = html;
}

function renderCustomList() {
  const section = document.getElementById('customDaysList');
  if (!customDays.length) { section.style.display='none'; return; }
  section.style.display='block';
  document.getElementById('customCount').textContent = customDays.length;
  document.getElementById('customCards').innerHTML = customDays.map((ev,idx) => cardHTML(ev, idx, true)).join('');
}

function addCustomDay() {
  const isim     = document.getElementById('f-isim').value.trim();
  const tur      = document.getElementById('f-tur').value;
  const ay       = parseInt(document.getElementById('f-ay').value);
  const gun      = parseInt(document.getElementById('f-gun').value);
  const aciklama = document.getElementById('f-aciklama').value.trim();
  if (!isim)                    { showToast('⚠️ Lütfen gün adı girin.'); return; }
  if (!gun||gun<1||gun>31)      { showToast('⚠️ Geçerli bir gün girin (1–31).'); return; }
  customDays.push({ay, gun, isim, tur, aciklama, _custom:true});
  saveCustom(); clearForm();
  renderAll(); renderUpcoming(); renderYear(); renderCustomList(); renderAlert();
  showToast(`✓ "${isim}" takvime eklendi!`);
}

function deleteCustomDay(idx) {
  const name = customDays[idx].isim;
  customDays.splice(idx,1); saveCustom();
  renderAll(); renderUpcoming(); renderYear(); renderCustomList(); renderAlert();
  showToast(`🗑️ "${name}" silindi.`);
}

function clearForm() {
  document.getElementById('f-isim').value='';
  document.getElementById('f-aciklama').value='';
  document.getElementById('f-tur').value='ozel';
  document.getElementById('f-ay').value='1';
  document.getElementById('f-gun').value='';
}

function switchTab(tab) {
  const keys=['upcoming','all','year','add'];
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', keys[i]===tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

renderHeader(); renderAlert(); renderUpcoming(); renderAll(); renderYear(); renderCustomList();
</script>
</body>
